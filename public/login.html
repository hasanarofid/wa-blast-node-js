<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login MASTER WA | Platform #1 Indonesia</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wa: {
                            light: '#25D366',
                            DEFAULT: '#128C7E',
                            dark: '#075E54'
                        },
                        cuan: {
                            gold: '#FFD700',
                            orange: '#FFA500'
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-gradient-wa {
                background: linear-gradient(135deg, #128C7E 0%, #075E54 50%, #25D366 100%) no-repeat center center fixed;
                background-size: cover;
            }
            .glass-card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                border: 2px solid rgba(255, 255, 255, 0.3);
            }
        }
    </style>
</head>

<body class="bg-gradient-wa text-gray-800 font-inter min-h-screen flex items-center justify-center p-4">

    <!-- Floating Background Emojis -->
    <div class="fixed top-1/4 left-10 text-3xl opacity-20 pointer-events-none -rotate-12">💸</div>
    <div class="fixed bottom-1/4 right-10 text-4xl opacity-20 pointer-events-none rotate-12">💰</div>

    <div
        class="glass-card rounded-[2rem] p-8 md:p-12 shadow-2xl w-full max-w-4xl relative z-10 border-white/50 bg-white/95 text-center">
        <!-- Header Section -->
        <h2 class="text-4xl md:text-5xl font-poppins font-black text-wa-light mb-3">
            LOGIN SEKARANG!
        </h2>
        <p class="text-lg md:text-xl font-bold text-gray-700 mb-10">
            Mulai hasilkan uang dari WhatsApp kamu! 💪
        </p>

        <!-- Form Section -->
        <form id="loginForm" action="/api/login" method="POST" class="text-left space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Username -->
                <div>
                    <label class="block text-sm font-semibold mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-user text-wa"></i> Username
                    </label>
                    <input type="text" name="username" placeholder="Masukkan username" required
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-wa focus:ring-4 focus:ring-wa/20 outline-none transition-all placeholder-gray-400 font-medium">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-semibold mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-lock text-wa"></i> Password
                    </label>
                    <input type="password" name="password" placeholder="Masukkan password" required
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-wa focus:ring-4 focus:ring-wa/20 outline-none transition-all placeholder-gray-400 font-medium">
                </div>
            </div>

            <!-- Verifikasi Keamanan Box -->
            <div class="border-2 border-green-100 rounded-2xl overflow-hidden shadow-sm">
                <div class="bg-green-50 px-6 py-4 border-b-2 border-green-100 flex justify-between items-center">
                    <h4 class="font-bold text-gray-800 flex items-center gap-2 m-0 uppercase text-sm tracking-wide">
                        <i class="fa-solid fa-shield-halved text-wa"></i> VERIFIKASI KEAMANAN
                    </h4>
                    <button type="button" id="btn-refresh-captcha"
                        class="bg-wa text-white w-8 h-8 rounded-full shadow-md flex justify-center items-center hover:bg-wa-dark transition-colors">
                        <i class="fa-solid fa-rotate"></i>
                    </button>
                </div>

                <div class="p-6 bg-white flex flex-col md:flex-row gap-6">
                    <!-- Math Captcha -->
                    <div class="flex-1">
                        <label class="block text-sm font-semibold mb-2">Berapa hasilnya?</label>
                        <div id="math-display"
                            class="bg-gradient-to-r from-cuan-gold to-cuan-orange text-gray-900 font-black text-2xl tracking-widest text-center py-4 rounded-xl shadow-inner mb-3">
                            ...
                        </div>
                        <input id="math-answer" type="text" placeholder="?" autocomplete="off"
                            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 text-center font-bold text-xl focus:border-cuan-orange outline-none transition-all">
                    </div>

                    <!-- Text Captcha -->
                    <div class="flex-1">
                        <label class="block text-sm font-semibold mb-2">Ketik kode ini:</label>
                        <div
                            class="bg-gray-100 border border-gray-200 py-4 items-center justify-center flex rounded-xl mb-3 h-20 relative overflow-hidden">
                            <div class="absolute inset-0 z-0">
                                <svg width="100%" height="100%" id="captcha-svg-lines">
                                    <line x1="5%" y1="15%" x2="95%" y2="85%" stroke="#cbd5e1" stroke-width="2" />
                                    <line x1="15%" y1="85%" x2="85%" y2="15%" stroke="#cbd5e1" stroke-width="2" />
                                </svg>
                            </div>
                            <span id="captcha-text-display"
                                class="text-3xl font-black font-mono text-gray-700 z-10 opacity-80 select-none"
                                style="letter-spacing: 12px;">-----</span>
                        </div>
                        <input id="captcha-text-answer" type="text" placeholder="Ketik kode di atas" autocomplete="off"
                            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 text-center font-bold text-xl uppercase focus:border-gray-400 outline-none transition-all">
                    </div>
                </div>
            </div>

            <!-- Login Button -->
            <button type="submit" id="btn-login"
                class="w-full bg-wa hover:bg-wa-dark text-white font-bold py-4 rounded-xl shadow-xl hover:shadow-2xl transition-all flex justify-center items-center gap-3 text-xl tracking-wide">
                <i class="fa-solid fa-right-to-bracket text-2xl"></i> MASUK & MULAI CUAN!
            </button>

            <!-- Link Register -->
            <div class="text-center pt-2">
                <span class="text-gray-600 font-medium">Belum punya akun?</span>
                <a href="/register" class="text-wa font-bold hover:underline transition-all">DAFTAR GRATIS!</a>
            </div>
        </form>
    </div>

    <script>
        // ── CAPTCHA System ────────────────────────────────────────────────────────
        let mathAnswer = 0;
        let captchaCode = '';

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateCaptcha() {
            // Math CAPTCHA
            const a = randomInt(2, 9);
            const b = randomInt(2, 9);
            const ops = [
                { symbol: 'x', fn: () => a * b },
                { symbol: '+', fn: () => a + b },
                { symbol: '-', fn: () => Math.max(a, b) - Math.min(a, b) }
            ];
            const op = ops[randomInt(0, ops.length - 1)];
            const n1 = op.symbol === '-' ? Math.max(a, b) : a;
            const n2 = op.symbol === '-' ? Math.min(a, b) : b;
            mathAnswer = op.fn();
            document.getElementById('math-display').textContent = `${n1} ${op.symbol} ${n2} = ?`;

            // Text CAPTCHA — 5 char alphanumeric uppercase
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            captchaCode = Array.from({ length: 5 }, () => chars[randomInt(0, chars.length - 1)]).join('');
            document.getElementById('captcha-text-display').textContent = captchaCode;

            // Randomize SVG noise lines
            const svg = document.getElementById('captcha-svg-lines');
            svg.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', randomInt(0, 30) + '%');
                line.setAttribute('y1', randomInt(0, 100) + '%');
                line.setAttribute('x2', randomInt(70, 100) + '%');
                line.setAttribute('y2', randomInt(0, 100) + '%');
                line.setAttribute('stroke', '#cbd5e1');
                line.setAttribute('stroke-width', '1.5');
                svg.appendChild(line);
            }

            // Clear previous answers
            document.getElementById('math-answer').value = '';
            document.getElementById('captcha-text-answer').value = '';
        }

        // Generate on page load
        generateCaptcha();

        // Refresh button
        document.getElementById('btn-refresh-captcha').addEventListener('click', generateCaptcha);

        // ── Login Form Submit ─────────────────────────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('btn-login');
            const username = form.querySelector('input[name="username"]').value.trim();
            const password = form.querySelector('input[name="password"]').value;

            // Validate CAPTCHA
            const mathInput = parseInt(document.getElementById('math-answer').value.trim(), 10);
            const textInput = document.getElementById('captcha-text-answer').value.trim().toUpperCase();

            if (isNaN(mathInput) || mathInput !== mathAnswer) {
                alert('Jawaban matematika salah! Coba lagi.');
                generateCaptcha();
                return;
            }
            if (textInput !== captchaCode) {
                alert('Kode verifikasi salah! Coba lagi.');
                generateCaptcha();
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-2xl"></i> Memproses...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('user_username', data.data.username);
                    localStorage.setItem('user_joinedAt', data.data.joinedAt);
                    window.location.href = '/dashboard';
                } else {
                    alert('Login gagal: ' + data.message);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket text-2xl"></i> MASUK & MULAI CUAN!';
                    generateCaptcha();
                }
            } catch (err) {
                alert('Terjadi kesalahan koneksi. Coba lagi.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket text-2xl"></i> MASUK & MULAI CUAN!';
                generateCaptcha();
            }
        });
    </script>
</body>

</html>
