version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution
    networks:
      - setorwa-network
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    networks:
      - setorwa-network

  evolution:
    image: evoapicloud/evolution-api:v2.2.3
    container_name: evolution
    restart: always
    environment:
      - SERVER_URL=http://evolution:8080
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=setorwasecret123
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#198754
      - CONFIG_SESSION_PHONE_CLIENT=SetorwaApp
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1025062854
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@postgres:5432/evolution?schema=public
    depends_on:
      - redis
      - postgres
    networks:
      - setorwa-network

  app:
    build: .
    container_name: app
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./sessions:/app/sessions
      - ./public/uploads:/app/public/uploads
    environment:
      - PORT=3001
      - TZ=Asia/Jakarta
      - NODE_ENV=production
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - EVO_URL=http://evolution:8080
      - EVO_KEY=setorwasecret123
    depends_on:
      - evolution
    networks:
      - setorwa-network

networks:
  setorwa-network:
    driver: bridge
